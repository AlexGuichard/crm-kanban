name: Briefing Matinal

on:
  schedule:
    - cron: "0 6 * * 1-6"   # 6h00 UTC = 7h00 Paris (lun-sam)
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lire emails Gmail
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python scripts/morning_briefing.py

      - name: Commit briefing
        run: |
          git config user.name "Flease Bot"
          git config user.email "bot@flease.fr"
          git add data/morning_briefing.json
          git diff --cached --quiet || git commit -m "briefing: $(date +%Y-%m-%d)"
          git push
